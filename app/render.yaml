services:
  - type: web
    name: edubridge-backend
    env: python
    region: oregon
    buildCommand: pip install -r app/requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        value: https://edu-bridge-ai-frontend.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
