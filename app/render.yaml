services:
  - type: web
    name: edubridge-backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app
        # Replace with your actual Vercel frontend URL
      - key: DATABASE_URL
        sync: false
        # IMPORTANT: Set this in Render Dashboard for security
        # Neon PostgreSQL format: postgresql://user:pass@host.neon.tech/db?sslmode=require
      - key: SECRET_KEY
        sync: false
        # IMPORTANT: Generate and set in Render Dashboard (32+ characters)

