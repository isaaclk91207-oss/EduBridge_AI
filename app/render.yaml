services:
  - type: web
    name: edubridge-backend
    env: python
    region: oregon
    rootDir: app
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port=10000
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        value: https://edu-bridge-ai-frontend.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: PIP_CACHE_DIR
        value: /opt/render/project/.cache/pip
      - key: CARGO_HOME
        value: /opt/render/project/.cargo
