services:
  - type: web
    name: edubridge-backend
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port=10000
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        value: https://edu-bridge-ai-frontend.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false

